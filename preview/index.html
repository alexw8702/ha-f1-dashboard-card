<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>F1 Dashboard Cards — v0.4.0 Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060609;
      color: #f2f2f5;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #e10600;
    }
    .intro {
      color: #9a9aa6;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.5;
    }
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card-section {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
    }
    .card-section h2 {
      font-size: 12px;
      color: #00e6c3;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏁 F1 Dashboard Cards</h1>
    <p class="intro">
      Vue 3 Redesign — 4 moderne Karten mit Carbon-Design, Live-Daten &amp; intelligenter Datenquellen-Integration.
    </p>

    <div class="cards-grid">
      <div class="card-section">
        <h2>🏆 Rennwochenende</h2>
        <f1-session-card id="session"></f1-session-card>
      </div>

      <div class="card-section">
        <h2>🏎️ Fahrerwertung</h2>
        <f1-drivers-card id="drivers"></f1-drivers-card>
      </div>

      <div class="card-section">
        <h2>🏁 Konstrukteurswertung</h2>
        <f1-constructors-card id="constructors"></f1-constructors-card>
      </div>

      <div class="card-section">
        <h2>📊 Letztes Rennen</h2>
        <f1-race-recap-card id="recap"></f1-race-recap-card>
      </div>
    </div>
  </div>

  <script src="../dist/f1-dashboard-card.js"></script>
  <script>
    // Mock-hass mit realen Sensor-Strukturen
    const hass = {
      states: {
        'sensor.f1_dashboard_session_status': {
          state: 'upcoming',
          last_updated: '2026-07-11T08:30:00+00:00',
          attributes: {
            next_race: {
              season: '2026', round: '10', raceName: 'Belgian Grand Prix',
              Circuit: {
                circuitId: 'spa', circuitName: 'Circuit de Spa-Francorchamps',
                Location: { lat: '50.4372', long: '5.97139', locality: 'Spa', country: 'Belgium' },
              },
              date: '2026-07-19', time: '13:00:00Z',
              FirstPractice: { date: '2026-07-17', time: '11:30:00Z' },
              SecondPractice: { date: '2026-07-17', time: '15:00:00Z' },
              ThirdPractice: { date: '2026-07-18', time: '10:30:00Z' },
              Qualifying: { date: '2026-07-18', time: '14:00:00Z' },
            },
            active_session: null,
          },
        },
        'sensor.f1_dashboard_fahrerwertung': {
          state: '2026',
          last_updated: '2026-07-11T08:30:00+00:00',
          attributes: {
            standings: [
              { name: 'Andrea Kimi Antonelli', team: 'Mercedes', teamId: 'mercedes', points: 179, wins: 5, nationality: 'Italian' },
              { name: 'George Russell', team: 'Mercedes', teamId: 'mercedes', points: 154, wins: 2, nationality: 'British' },
              { name: 'Lewis Hamilton', team: 'Ferrari', teamId: 'ferrari', points: 147, wins: 1, nationality: 'British' },
              { name: 'Charles Leclerc', team: 'Ferrari', teamId: 'ferrari', points: 108, wins: 1, nationality: 'Monegasque' },
              { name: 'Lando Norris', team: 'McLaren', teamId: 'mclaren', points: 97, wins: 0, nationality: 'British' },
            ],
          },
        },
        'sensor.f1_dashboard_konstrukteurswertung': {
          state: '2026',
          last_updated: '2026-07-11T08:30:00+00:00',
          attributes: {
            standings: [
              { name: 'Mercedes', constructorId: 'mercedes', points: 333, wins: 7 },
              { name: 'Ferrari', constructorId: 'ferrari', points: 255, wins: 2 },
              { name: 'McLaren', constructorId: 'mclaren', points: 179, wins: 0 },
            ],
          },
        },
        'sensor.f1_dashboard_letztes_rennen_detail': {
          state: 'complete',
          last_updated: '2026-07-11T08:30:00+00:00',
          attributes: {
            raceName: 'French Grand Prix',
            date: '2026-07-05',
            results: [
              { position: 1, driver: { name: 'Andrea Kimi Antonelli' }, constructor: { name: 'Mercedes', constructorId: 'mercedes' }, points: 25, time: '1:32:45.123' },
              { position: 2, driver: { name: 'George Russell' }, constructor: { name: 'Mercedes', constructorId: 'mercedes' }, points: 18, time: '+5.234' },
              { position: 3, driver: { name: 'Lewis Hamilton' }, constructor: { name: 'Ferrari', constructorId: 'ferrari' }, points: 15, time: '+12.456' },
              { position: 4, driver: { name: 'Charles Leclerc' }, constructor: { name: 'Ferrari', constructorId: 'ferrari' }, points: 12, time: '+18.567' },
              { position: 5, driver: { name: 'Lando Norris' }, constructor: { name: 'McLaren', constructorId: 'mclaren' }, points: 10, time: '+24.123' },
            ],
            stints: [
              { driver: { name: 'Antonelli' }, constructor: { constructorId: 'mercedes' }, position: 1, compound: ['SOFT', 'HARD'], laps: 34 },
              { driver: { name: 'Russell' }, constructor: { constructorId: 'mercedes' }, position: 2, compound: ['MEDIUM', 'HARD'], laps: 34 },
              { driver: { name: 'Hamilton' }, constructor: { constructorId: 'ferrari' }, position: 3, compound: ['SOFT', 'MEDIUM'], laps: 34 },
            ],
            pit_stops: [
              { driver: { name: 'Antonelli' }, stop: 1, lap: 24, duration: '2.156' },
              { driver: { name: 'Russell' }, stop: 1, lap: 25, duration: '2.341' },
              { driver: { name: 'Hamilton' }, stop: 1, lap: 26, duration: '2.214' },
            ],
          },
        },
      },
    };

    // Alle Karten mit hass + config initialisieren
    ['session', 'drivers', 'constructors', 'recap'].forEach(id => {
      const el = document.getElementById(id);
      const entityMap = {
        session: 'sensor.f1_dashboard_session_status',
        drivers: 'sensor.f1_dashboard_fahrerwertung',
        constructors: 'sensor.f1_dashboard_konstrukteurswertung',
        recap: 'sensor.f1_dashboard_letztes_rennen_detail',
      };
      el.setConfig({ entity: entityMap[id] });
      el.hass = hass;
    });
  </script>
</body>
</html>
