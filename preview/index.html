<!DOCTYPE html>
<html lang="de">

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>F1 Dashboard Cards — v0.4.0 Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060609;
      color: #f2f2f5;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
      padding: 20px;
    }
    .container { max-width: 500px; margin: 0 auto; }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
      color: #e10600;
    }
    .intro {
      color: #9a9aa6;
      margin-bottom: 20px;
      font-size: 13px;
      line-height: 1.5;
    }
    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card-section {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255, 255, 255, 0.02);
    }
    .card-section h2 {
      font-size: 12px;
      color: #00e6c3;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
  </style>

<body>
  <div class="container">
    <h1>🏁 F1 Dashboard Cards</h1>
    <p class="intro">
      Vue 3 Redesign — 4 moderne Karten mit Carbon-Design, Live-Daten &amp; intelligenter Datenquellen-Integration.
    </p>

    <div class="cards-grid">
      <div class="card-section">
        <h2>🏆 Rennwochenende</h2>
        <f1-session-card id="session"></f1-session-card>
      </div>

      <div class="card-section">
        <h2>🏎️ Fahrerwertung</h2>
        <f1-drivers-card id="drivers"></f1-drivers-card>
      </div>

      <div class="card-section">
        <h2>🏁 Konstrukteurswertung</h2>
        <f1-constructors-card id="constructors"></f1-constructors-card>
      </div>

      <div class="card-section">
        <h2>📊 Letztes Rennen</h2>
        <f1-race-recap-card id="recap"></f1-race-recap-card>

    </div>
  </div>
